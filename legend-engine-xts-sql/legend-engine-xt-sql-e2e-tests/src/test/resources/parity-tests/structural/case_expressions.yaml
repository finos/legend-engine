tests:
  # Simple CASE (CASE <expr> WHEN <val> THEN ...)
  - id: case_simple_basic
    sql: "SELECT name, CASE dept_id WHEN 1 THEN 'Engineering' WHEN 2 THEN 'Sales' ELSE 'Other' END AS dept_name FROM persons ORDER BY 1"
    feature: "simple CASE"
    category: "case_expressions"
    expected_tds_status: PASS
    expected_rel_status: PASS
  - id: case_simple_no_else
    sql: "SELECT name, CASE dept_id WHEN 1 THEN 'Engineering' WHEN 2 THEN 'Sales' END AS dept_name FROM persons ORDER BY 1"
    feature: "simple CASE without ELSE"
    category: "case_expressions"
    expected_tds_status: PASS
    expected_rel_status: PASS
  - id: case_simple_multiple_whens
    sql: "SELECT name, CASE dept_id WHEN 1 THEN 'A' WHEN 2 THEN 'B' WHEN 3 THEN 'C' WHEN 4 THEN 'D' ELSE 'Z' END AS label FROM persons ORDER BY 1"
    feature: "simple CASE multiple WHENs"
    category: "case_expressions"

  # Searched CASE (CASE WHEN <condition> THEN ...)
    expected_tds_status: PASS
    expected_rel_status: PASS
  - id: case_searched_basic
    sql: "SELECT name, CASE WHEN age < 30 THEN 'young' WHEN age < 50 THEN 'middle' ELSE 'senior' END AS age_group FROM persons ORDER BY 1"
    feature: "searched CASE"
    category: "case_expressions"
    expected_tds_status: PASS
    expected_rel_status: PASS
  - id: case_searched_no_else
    sql: "SELECT name, CASE WHEN age < 30 THEN 'young' WHEN age < 50 THEN 'middle' END AS age_group FROM persons ORDER BY 1"
    feature: "searched CASE without ELSE"
    category: "case_expressions"
    expected_tds_status: PASS
    expected_rel_status: PASS
  - id: case_searched_single_when
    sql: "SELECT name, CASE WHEN salary > 50000 THEN 'high' ELSE 'low' END AS salary_tier FROM persons ORDER BY 1"
    feature: "searched CASE single WHEN"
    category: "case_expressions"

  # CASE with NULL
    expected_tds_status: PASS
    expected_rel_status: PASS
  - id: case_null_in_then
    sql: "SELECT name, CASE WHEN age > 50 THEN NULL ELSE age END AS adjusted_age FROM persons ORDER BY 1"
    feature: "CASE returning NULL"
    category: "case_expressions"
    expected_tds_status: PASS
    expected_rel_status: PASS
  - id: case_null_in_condition
    sql: "SELECT name, CASE WHEN age IS NULL THEN 'unknown' ELSE 'known' END AS age_status FROM persons ORDER BY 1"
    feature: "CASE with NULL condition"
    category: "case_expressions"
    expected_tds_status: PASS
    expected_rel_status: PASS
  - id: case_simple_null_compare
    sql: "SELECT name, CASE age WHEN NULL THEN 'null' ELSE 'not null' END AS result FROM persons ORDER BY 1"
    feature: "simple CASE comparing NULL"
    category: "case_expressions"

  # CASE in different clauses
    expected_tds_status: PASS
    expected_rel_status: PASS
  - id: case_in_where
    sql: "SELECT name, salary FROM persons WHERE CASE WHEN dept_id = 1 THEN salary > 40000 ELSE salary > 50000 END ORDER BY 1"
    feature: "CASE in WHERE"
    category: "case_expressions"
    expected_tds_status: PASS
    expected_rel_status: PASS
  - id: case_in_order_by
    sql: "SELECT name, dept_id FROM persons ORDER BY CASE WHEN dept_id = 1 THEN 0 ELSE 1 END, name"
    feature: "CASE in ORDER BY"
    category: "case_expressions"
    expected_tds_status: ERROR
    expected_rel_status: ERROR
  - id: case_in_group_by
    sql: "SELECT CASE WHEN age < 30 THEN 'young' ELSE 'older' END AS age_group, COUNT(*) AS cnt FROM persons GROUP BY CASE WHEN age < 30 THEN 'young' ELSE 'older' END ORDER BY 1"
    feature: "CASE in GROUP BY"
    category: "case_expressions"

  # Nested CASE
    expected_tds_status: PASS
    expected_rel_status: PASS
  - id: case_nested
    sql: "SELECT name, CASE WHEN dept_id = 1 THEN CASE WHEN salary > 50000 THEN 'senior eng' ELSE 'junior eng' END ELSE 'other' END AS role FROM persons ORDER BY 1"
    feature: "nested CASE"
    category: "case_expressions"

  # CASE with expressions/aggregates
    expected_tds_status: PASS
    expected_rel_status: PASS
  - id: case_with_aggregate
    sql: "SELECT dept_id, SUM(CASE WHEN salary > 50000 THEN 1 ELSE 0 END) AS high_earners FROM persons WHERE dept_id IS NOT NULL GROUP BY dept_id ORDER BY 1"
    feature: "CASE inside aggregate"
    category: "case_expressions"
    expected_tds_status: PASS
    expected_rel_status: PASS
  - id: case_with_arithmetic
    sql: "SELECT name, CASE WHEN dept_id = 1 THEN salary * 1.1 ELSE salary * 1.05 END AS adjusted_salary FROM persons WHERE salary IS NOT NULL ORDER BY 1"
    feature: "CASE with arithmetic"
    category: "case_expressions"

    expected_tds_status: PASS
    expected_rel_status: ERROR
