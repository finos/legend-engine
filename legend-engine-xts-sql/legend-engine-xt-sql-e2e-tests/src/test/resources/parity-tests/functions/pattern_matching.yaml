tests:
  - id: like__bytea_bytea__unsupported_type
    sql: "SELECT 1 AS result FROM persons WHERE id = 1"
    function: like
    signature: "like(bytea, bytea) → boolean"
    expected_tds_status: PASS
    expected_rel_status: PASS
  - id: like__name_txt__from_table
    sql: "SELECT name LIKE '%li%' AS result FROM persons ORDER BY 1"
    function: like
    signature: "like(name, text) → boolean"
    expected_tds_status: PASS
    expected_rel_status: PASS
  - id: like__txt_txt__from_table
    sql: "SELECT val LIKE '%lo%' AS result FROM strings ORDER BY 1"
    function: like
    signature: "like(text, text) → boolean"
    expected_tds_status: PASS
    expected_rel_status: PASS
