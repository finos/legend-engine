      columns:
        - { name: id, type: "INTEGER" }
        - { name: name, type: "VARCHAR(200)" }
        - { name: age, type: "INTEGER" }
        - { name: salary, type: "DECIMAL(10,2)" }
        - { name: hire_date, type: "DATE" }
        - { name: active, type: "BOOLEAN" }
        - { name: dept_id, type: "INTEGER" }
