name: m2m-mixed
title: "M2M Mapping with Passing and Failing Tests"
description: |
  A model-to-model mapping with one passing test and one failing test.
  Used to verify that EMIT TEST_EXECUTION reports failure when at least
  one assertion fails.

modelSources:
  model:
    root: m2m-mixed
