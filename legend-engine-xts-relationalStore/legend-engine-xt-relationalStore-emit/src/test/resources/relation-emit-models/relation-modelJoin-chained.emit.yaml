name: relation-modelJoin-chained
title: "Chained Two-Hop ModelJoin — Firm -> Department -> Employee"
description: |
  Two separate ModelJoin blocks (Firm-Department, Department-Employee) chained in one
  Relation-mapped mapping, mirroring
  testModelJoinAdvanced.pure::testChainedTwoHops's shape (two ModelJoin
  associations combined so navigating firm.departments.staff.firstName crosses both
  hops). A single-hop testSuite (firm.departments.name) is kept alongside the two-hop
  one to prove the simpler case independently. Test data intentionally gives every
  firm at least one department and every department at least one employee, so every
  row resolves — unlike the reference unit test, this model does not exercise the
  TDSNull-for-no-match path, since no existing EMIT model has proven how a
  Relation-mapped ModelJoin's unmatched leg serializes to JSON, and reproducing that
  specific edge case isn't necessary to demonstrate the chaining mechanism itself.
  Deliberately excludes union, milestoning, and sub-aggregation — this is already a
  two-hop combination on its own.

modelSources:
  model:
    root: relation-modelJoin-chained
    files:
      - mapping/chainedModelJoinMapping.pure
      - data/testData.pure
  dependencies:
    - source: relation-shared-domain.emit.yaml
    - source: relation-shared-db.emit.yaml

features:
  - scaffolding:class
  - scaffolding:relation-function
  - scaffolding:relation-mapping
  - store:relation-model-join
  - execution:data-element
  - execution:test-data
stores:
  - relational
complexity: complex
tags:
  - h2
  - mapping-test
  - relation
  - modeljoin
  - chained-hops
