name: relation-embedded
title: "Relation Function Mapping — Embedded Property Mapping"
description: |
  Exercises inline embedded property mapping: the address property of Employee is
  embedded inline via address(street: STREET, city: CITY). STREET and CITY are NOT NULL
  columns in EmployeeTable. Two testSuites: one projects address.city; one filters
  on address.city equality.

modelSources:
  model:
    root: relation-embedded
    files:
      - mapping/embeddedMapping.pure   # ###Pure (employees func) + ###Mapping with embedded + testSuites
      - data/testData.pure   # scenario-specific EmployeeCityHeadcountData only; EmployeeData comes from relation-shared-data
  dependencies:
    - source: relation-shared-data.emit.yaml

features:
  - scaffolding:class
  - scaffolding:relation-function
  - scaffolding:relation-mapping
  - grammar:embedded-relation
  - execution:data-element
  - execution:test-data
stores:
  - relational
complexity: basic
tags:
  - h2
  - mapping-test
  - relation
  - embedded
