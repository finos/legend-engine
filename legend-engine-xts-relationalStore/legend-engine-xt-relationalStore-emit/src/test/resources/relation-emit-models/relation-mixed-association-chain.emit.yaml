name: relation-mixed-association-chain
title: "Mixed Relational+Relation Mapping — Chained Associations"
description: |
  Employee is mapped via classic Relational (not ~func) in this model, Department via
  classic Relational, and Firm via ~func (Relation) — mirroring
  MixedCaseAssociationChainMapping / testMixedCaseMappingThroughAssociationChain: one
  root class traverses two chained associations (Employee->Department, Employee->Firm)
  to two different classes, one association wired XStore across the Relational/Relation
  store-type boundary, with a filter on the intermediate hop.

modelSources:
  model:
    root: relation-mixed-association-chain
    files:
      - mapping/mixedChainMapping.pure
      - data/testData.pure
  dependencies:
    - source: relation-shared-domain.emit.yaml
    - source: relation-shared-db.emit.yaml

features:
  - scaffolding:class
  - scaffolding:relation-function
  - scaffolding:relation-mapping
  - scaffolding:relational-mapping
  - store:relation-model-join
  - execution:data-element
  - execution:test-data
stores:
  - relational
complexity: basic
tags:
  - h2
  - mapping-test
  - relation
  - association
  - mixed-mapping
