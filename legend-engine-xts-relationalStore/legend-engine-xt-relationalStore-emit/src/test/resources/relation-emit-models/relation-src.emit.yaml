name: relation-src
title: "Relation Function Mapping — ~src Inline Source Form"
description: |
  Exercises the ~src inline-source mapping form (the #4941 alternative to ~func).
  The source expression is wrapped in a zero-arg helper function that returns a typed
  Relation, avoiding the parser stack-overflow on raw #>{...}# literals under ~src.
  Two mapping variants: plain source (all columns) and filter-in-source (active only).
  Asserts PARSE round-trip, COMPILE, and TEST_EXECUTION via mapping testSuites.

modelSources:
  model:
    root: relation-src
    files:
      - mapping/srcMapping.pure   # ###Pure (typed source funcs) + ###Mapping + testSuites
  dependencies:
    - source: relation-shared-data.emit.yaml

features:
  - scaffolding:class
  - scaffolding:relation-function
  - scaffolding:relation-mapping
  - grammar:relation-src
  - execution:data-element
  - execution:test-data
stores:
  - relational
complexity: intermediate
tags:
  - h2
  - mapping-test
  - relation
  - src
