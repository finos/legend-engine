name: relation-modelJoin
title: "Relation Function Mapping — ModelJoin Association (Employee → Firm)"
description: |
  Same shape as relation-join (Employee and Firm each backed by their own relation
  function), but the Employment association is realised via a ModelJoin instead of
  an XStore. ModelJoin's compiler support (HelperMappingBuilder.processModelJoinAssociationMapping)
  is generic over InstanceSetImplementation and pairs every (source-set, target-set)
  combination regardless of whether the sets are Relational or Relation-mapped, so it
  works for two Relation-mapped classes exactly as it does for two Relational ones.
  The testSuite asserts that $x.employer.legalName resolves correctly through the
  ModelJoin, proving this alternative association mechanism for relation mappings.

modelSources:
  model:
    root: relation-modelJoin
    files:
      - mapping/modelJoinMapping.pure   # ###Pure (employees + firms funcs) + ###Mapping with ModelJoin + testSuites
  dependencies:
    - source: relation-shared-data.emit.yaml

features:
  - scaffolding:class
  - scaffolding:relation-function
  - scaffolding:relation-mapping
  - store:relation-model-join
  - execution:data-element
  - execution:test-data
stores:
  - relational
complexity: basic
tags:
  - h2
  - mapping-test
  - relation
  - association
  - modeljoin
