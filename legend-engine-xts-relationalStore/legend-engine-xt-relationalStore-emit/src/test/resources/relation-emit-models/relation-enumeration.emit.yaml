name: relation-enumeration
title: "Relation Function Mapping — EnumerationMapping Transformer"
description: |
  The Employee class is mapped via a relation function with an EnumerationMapping
  that decodes the VARCHAR EMP_TYPE column into the EmployeeType enumeration.
  Two testSuite assertions: one projects enum labels to verify decoding; one
  filters by enum equality to verify that enum comparison works end-to-end.

modelSources:
  model:
    root: relation-enumeration
    files:
      - mapping/enumMapping.pure   # ###Pure (employees func) + ###Mapping + testSuites
      - data/testData.pure
  dependencies:
    - source: relation-shared-domain.emit.yaml
    - source: relation-shared-db.emit.yaml

features:
  - scaffolding:class
  - scaffolding:relation-function
  - scaffolding:relation-mapping
  - grammar:enumeration-mapping
  - execution:data-element
  - execution:test-data
stores:
  - relational
complexity: basic
tags:
  - h2
  - mapping-test
  - relation
  - enumeration
