name: relation-union
title: "Relation Function Mapping — Operation Union of Two Relation Sets"
description: |
  Two Employee set implementations (contractSet, fullTimeSet) backed by separate
  relation functions are unioned via Operation { union(...) }. The testSuite verifies
  that rows from both legs appear in query results. Known exclusion: the importDataFlow
  discriminator pattern (matrix #28) is not covered here.

modelSources:
  model:
    root: relation-union
    files:
      - mapping/unionMapping.pure   # ###Pure (contractEmployees + fullTimeEmployees) + ###Mapping + testSuites
      - data/testData.pure
  dependencies:
    - source: relation-shared-domain.emit.yaml
    - source: relation-shared-db.emit.yaml

features:
  - scaffolding:class
  - scaffolding:relation-function
  - scaffolding:relation-mapping
  - grammar:relation-union
  - execution:data-element
  - execution:test-data
stores:
  - relational
complexity: complex
tags:
  - h2
  - mapping-test
  - relation
  - union
