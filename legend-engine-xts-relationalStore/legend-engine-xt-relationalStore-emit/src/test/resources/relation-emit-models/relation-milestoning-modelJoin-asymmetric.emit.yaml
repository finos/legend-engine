name: relation-milestoning-modelJoin-asymmetric
title: "ModelJoin Between Business-Temporal and Processing-Temporal Relation Classes"
description: |
  A single-hop ModelJoin directly between BusinessTemporalEmployee (business-temporal)
  and TemporalEmployee (processing-temporal), both Relation-mapped, matched by id.
  Mirrors testModelJoinMilestoning.pure::testMilestoningDiffScheme's shape (two
  different milestoning schemes joined together), simplified to always-temporally-valid
  test data on both sides — this model proves the cross-scheme ModelJoin mechanism
  works, not the full null-propagation matrix (that stays unit-test-only breadth per
  the "one or two representative uses, not the whole matrix" principle). The
  same-scheme variant (two classes of the identical milestoning type) is out of scope
  for this pass — it would require a second class of the same temporal type beyond
  what the shared fixtures currently provide.

modelSources:
  model:
    root: relation-milestoning-modelJoin-asymmetric
    files:
      - mapping/asymmetricMilestoningMapping.pure
      - data/testData.pure
  dependencies:
    - source: relation-shared-domain.emit.yaml
    - source: relation-shared-db.emit.yaml

features:
  - scaffolding:class
  - scaffolding:relation-function
  - scaffolding:relation-mapping
  - grammar:milestoning
  - store:relation-model-join
  - execution:data-element
  - execution:test-data
stores:
  - relational
complexity: complex
tags:
  - h2
  - mapping-test
  - relation
  - milestoning
  - modeljoin
