name: relation-union-enum
title: "Relation Function Mapping — Union with Enum Filter and Embedded Property"
description: |
  Two Relation-mapped union legs (contractSet, fullTimeSet) both declare the same
  EmployeeType EnumerationMapping and the same embedded address(street, city)
  property, on ExtendedEmployee. Both filtering by enum value and projecting/filtering
  on the embedded property work across the union — neither touches the documented
  unionBase.ACTIVE SQL-gen bug (that bug is specific to expression-derived,
  non-projected boolean properties, not enums or embedded structs).

modelSources:
  model:
    root: relation-union-enum
    files:
      - mapping/unionEnumMapping.pure
      - data/testData.pure
  dependencies:
    - source: relation-shared-domain.emit.yaml
    - source: relation-shared-db.emit.yaml

features:
  - scaffolding:class
  - scaffolding:relation-function
  - scaffolding:relation-mapping
  - grammar:relation-union
  - grammar:enumeration-mapping
  - grammar:embedded-relation
  - execution:data-element
  - execution:test-data
stores:
  - relational
complexity: complex
tags:
  - h2
  - mapping-test
  - relation
  - union
  - enumeration
  - embedded
