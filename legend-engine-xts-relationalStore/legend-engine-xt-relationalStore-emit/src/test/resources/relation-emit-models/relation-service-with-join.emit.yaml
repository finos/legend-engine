name: relation-service-with-join
title: "Relation Function Mapping — Service with Association Traversal and Derived Property"
description: |
  Mirrors the classic relational-emit-models/relational-service-with-join model, for the
  `~func` Relation mapping form: a Service whose query combines a qualified/derived property
  (Employee.fullName(), a Pure-computed property with no column mapping) AND an XStore
  association traversal (employer.legalName) in the same project(). Neither relation-service
  (Service + groupBy, no association, no derived property) nor relation-join/relation-modelJoin
  (association traversal, but not wrapped in a Service) combine all three. Exercises EMIT
  Phase 5 (Service test execution) and Phase 6 (plan generation) for this richer query shape.

modelSources:
  model:
    root: relation-service-with-join
    files:
      - mapping/employeeServiceJoinMapping.pure
      - connection/h2Connection.pure
      - runtime/employeeServiceJoinRuntime.pure
      - service/employeeServiceJoinService.pure
  dependencies:
    - source: relation-shared-domain.emit.yaml
    - source: relation-shared-db.emit.yaml

features:
  - scaffolding:class
  - scaffolding:relation-function
  - scaffolding:relation-mapping
  - grammar:derived-property
  - store:relation-xstore
  - execution:service
  - execution:service-test
  - execution:plan-generation
stores:
  - relational
complexity: complex
tags:
  - h2
  - mapping-test
  - relation
  - service
  - association
  - derived-property
