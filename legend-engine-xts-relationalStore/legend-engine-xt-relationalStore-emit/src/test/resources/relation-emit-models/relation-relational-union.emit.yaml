name: relation-relational-union
title: "Relation Function Mapping — Mixed Relation + Relational Union"
description: |
  One Relation set (CONTRACT employees via ~func) and one classic Relational set
  (FULL_TIME employees via ~filter on EmployeeTable) are unioned under a single
  Operation { union(...) }. Exercises the mixed-mapping code path documented in
  MixedMapping unit tests. The testSuite asserts rows from both legs appear.

modelSources:
  model:
    root: relation-relational-union
    files:
      - mapping/mixedUnionMapping.pure   # ###Pure (contractEmployees func) + ###Mapping with mixed union
      - data/testData.pure
  dependencies:
    - source: relation-shared-domain.emit.yaml
    - source: relation-shared-db.emit.yaml

features:
  - scaffolding:class
  - scaffolding:relation-function
  - scaffolding:relation-mapping
  - grammar:relation-union
  - execution:data-element
  - execution:test-data
stores:
  - relational
complexity: complex
tags:
  - h2
  - mapping-test
  - relation
  - union
  - mixed
