name: relation-shared-data
title: "Shared Seed Data for Relation Mapping EMIT Models"
description: |
  Reusable Data elements (embedded Relation test data) for the canonical Employee
  datasets shared across relation-mapping EMIT models. EmployeeData is the 3-row
  Alice/Bob/Carol set (Carol inactive, null salary) consumed by the simple-schema
  scenarios; EmployeeFirmData adds the two-firm (Acme/Beta) set for association
  scenarios. Depends on relation-shared-db so the EmployeeDB tables are in scope,
  and transitively supplies the store + domain to any consuming model — a single
  dependency replaces the shared-domain + shared-db pair. Scenario-specific data
  (temporal, aggregation, union splits, extra columns) stays local to each model.

modelSources:
  model:
    root: relation-shared-data
    files:
      - data/employeeData.pure
  dependencies:
    - source: relation-shared-db.emit.yaml

features:
  - execution:data-element
  - execution:test-data
stores:
  - relational
complexity: basic
tags:
  - shared-data
  - relation
  - h2
