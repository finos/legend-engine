name: relation-groupBy
title: "Relation Function Mapping — GroupBy Aggregation in Function Body"
description: |
  The Position class is backed by a relation function that applies ->groupBy() on
  PositionTable, grouping by GSN and PRODUCT_ID with a sum(QTY) aggregate. The
  mapped class represents the aggregated result directly: no post-mapping groupBy
  needed. The testSuite verifies that the aggregate values are correct.

modelSources:
  model:
    root: relation-groupBy
    files:
      - mapping/groupByMapping.pure   # ###Pure (positions func with groupBy) + ###Mapping + testSuites
      - data/testData.pure
  dependencies:
    - source: relation-shared-domain.emit.yaml
    - source: relation-shared-db.emit.yaml

features:
  - scaffolding:class
  - scaffolding:relation-function
  - scaffolding:relation-mapping
  - execution:data-element
  - execution:test-data
stores:
  - relational
complexity: basic
tags:
  - h2
  - mapping-test
  - relation
  - groupBy
  - aggregation
