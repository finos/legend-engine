name: relation-window-function
title: "Relation Function Mapping — Window Function + ModelJoin Association"
description: |
  A window function (->extend(over(...), ~[RANK:{p,w,r|$p->rank($w,$r)}])) ranks
  employees by salary within each firm, backing a real `rank` property on a
  model-local RankedEmployee subclass (mirroring relationMappingSetup.pure's
  ExtendedPerson/WindowColumnMapping). Combined with a ModelJoin association to Firm so
  this isn't a bare single-feature model. This is new territory for EMIT — no existing
  model exercises window syntax end-to-end from raw text before this one.

modelSources:
  model:
    root: relation-window-function
    files:
      - mapping/windowFunctionMapping.pure
      - data/testData.pure
  dependencies:
    - source: relation-shared-domain.emit.yaml
    - source: relation-shared-db.emit.yaml

features:
  - scaffolding:class
  - scaffolding:relation-function
  - scaffolding:relation-mapping
  - grammar:window-function
  - execution:data-element
  - execution:test-data
stores:
  - relational
complexity: complex
tags:
  - h2
  - mapping-test
  - relation
  - window-function
  - association
  - modeljoin
