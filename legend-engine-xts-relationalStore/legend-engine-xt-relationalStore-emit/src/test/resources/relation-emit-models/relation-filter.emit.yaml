name: relation-filter
title: "Relation Function Mapping — Filter in Function Body"
description: |
  The Employee class is mapped via a relation function that applies ->filter() in its
  body so that inactive employees never surface through Class.all(). The testSuite
  data contains both active and inactive rows; the assertion verifies only the active
  rows appear. A second test stacks a query-time filter on top to verify filter
  composition.

modelSources:
  model:
    root: relation-filter
    files:
      - mapping/filterMapping.pure   # ###Pure (activeEmployees func) + ###Mapping + testSuites
  dependencies:
    - source: relation-shared-data.emit.yaml

features:
  - scaffolding:class
  - scaffolding:relation-function
  - scaffolding:relation-mapping
  - execution:data-element
  - execution:test-data
stores:
  - relational
complexity: basic
tags:
  - h2
  - mapping-test
  - relation
  - filter
