name: relation-include
title: "Relation Function Mapping — Mapping Include"
description: |
  A base mapping (BaseIncludeMapping) maps Employee via ~func with a normal property
  list; an outer mapping (OuterIncludeMapping) does nothing but `include
  BaseIncludeMapping` and carries the testSuites. Proves the mapping-include mechanism
  executes end-to-end for a relation mapping (existing include coverage elsewhere is
  compile/round-trip only).

modelSources:
  model:
    root: relation-include
    files:
      - mapping/includeMapping.pure   # ###Pure (includeEmployees func) + ###Mapping (base + outer-include) + testSuites
  dependencies:
    - source: relation-shared-data.emit.yaml

features:
  - scaffolding:class
  - scaffolding:relation-function
  - scaffolding:relation-mapping
  - grammar:mapping-include
  - execution:data-element
  - execution:test-data
stores:
  - relational
complexity: basic
tags:
  - h2
  - mapping-test
  - relation
  - include
