name: relation-expression-rhs
title: "Relation Function Mapping — Expression RHS Property Mapping"
description: |
  Exercises expression-RHS property mapping: arithmetic on a nullable column via
  ->toOne() coercion (salaryDoubled = SALARY->toOne() * 2.0) and string concat
  (fullGreeting = 'Hello, ' + FIRST_NAME + ' ' + LAST_NAME). Asserts that computed
  values are correctly projected through the full pipeline.

modelSources:
  model:
    root: relation-expression-rhs
    files:
      - mapping/exprMapping.pure   # ###Pure (salariedEmployees func) + ###Mapping + testSuites
      - data/testData.pure
  dependencies:
    - source: relation-shared-domain.emit.yaml
    - source: relation-shared-db.emit.yaml

features:
  - scaffolding:class
  - scaffolding:relation-function
  - scaffolding:relation-mapping
  - grammar:relation-expression-rhs
  - execution:data-element
  - execution:test-data
stores:
  - relational
complexity: intermediate
tags:
  - h2
  - mapping-test
  - relation
  - expression-rhs
